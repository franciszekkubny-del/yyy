<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Profil Pyrkon 2026</title>

<style>
    body {
        background: #1A0F2E;
        color: #FFFFFF;
        font-family: "Segoe UI", sans-serif;
        padding: 20px;
    }

    .container {
        max-width: 650px;
        margin: auto;
        background: rgba(0,0,0,0.35);
        border: 2px solid #E6C36A;
        border-radius: 16px;
        padding: 25px;
        box-shadow: 0 0 25px #8A4FFF;
        backdrop-filter: blur(6px);
    }

    .avatar {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        object-fit: cover;
        display: block;
        margin: 0 auto 20px auto;
        border: 4px solid #E6C36A;
        box-shadow: 0 0 20px #8A4FFF;
    }

    h1 {
        text-align: center;
        color: #E6C36A;
        font-size: 32px;
        margin-bottom: 10px;
        text-shadow: 0 0 10px #8A4FFF;
    }

    .info p {
        font-size: 20px;
        margin: 10px 0;
    }

    .info span {
        color: #E6C36A;
        font-weight: bold;
    }

    .socials {
        text-align: center;
        margin-top: 25px;
    }

    .socials img {
        width: 48px;
        transition: 0.2s;
        filter: drop-shadow(0 0 8px #8A4FFF);
    }

    .socials img:hover {
        transform: scale(1.15);
        filter: drop-shadow(0 0 12px #E6C36A);
    }

    .back {
        text-align: center;
        margin-top: 20px;
    }

    .back a {
        color: #E6C36A;
        text-decoration: none;
        font-size: 18px;
    }

    .back a:hover {
        text-shadow: 0 0 10px #8A4FFF;
    }
</style>
</head>
<body>

<div class="container">

    <img id="avatar" class="avatar">

    <h1 id="imie"></h1>

    <div class="info">
        <p><span>Postać na Pyrkonie:</span> <span id="postac"></span></p>
        <p><span>Imię:</span> <span id="imie2"></span></p>
        <p><span>Wiek:</span> <span id="wiek"></span></p>
        <p><span>Ranga (peak):</span> <span id="ranga"></span></p>
        <p><span>Main:</span> <span id="main"></span></p>
        <p><span>Instagram:</span> <span id="instagram"></span></p>
        <p><span>Valorant:</span> <span id="valorant"></span></p>
    </div>

    <div class="socials">
        <a id="insta_link" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
        </a>
    </div>

    <div class="back">
        <a href="index.html">← Powrót do listy profili</a>
    </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch("data.json")
  .then(r => r.json())
  .then(data => {
    const p = data.find(x => x.id === id);

    if (!p) {
      document.body.innerHTML = "<h1>Profil nie istnieje</h1>";
      return;
    }

    document.getElementById("avatar").src = p.avatar;
    document.getElementById("imie").textContent = p.imie;
    document.getElementById("imie2").textContent = p.imie;
    document.getElementById("postac").textContent = p.postac;
    document.getElementById("wiek").textContent = p.wiek;
    document.getElementById("ranga").textContent = p.ranga;
    document.getElementById("main").textContent = p.main;
    document.getElementById("instagram").textContent = p.instagram;
    document.getElementById("valorant").textContent = p.valorant;

    document.getElementById("insta_link").href = p.instagram_url;
  });
</script>

</body>
</html>
