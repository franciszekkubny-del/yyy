<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Lista profili</title>
<style>
    body { background:#0f0f0f; color:white; font-family:Arial; padding:20px; }
    .card {
        background:#1a1a1a; padding:15px; border-radius:10px;
        margin-bottom:15px; display:flex; align-items:center;
        cursor:pointer; transition:0.2s;
    }
    .card:hover { background:#222; }
    img { width:80px; height:80px; border-radius:50%; margin-right:15px; object-fit:cover; }
    h2 { margin:0; color:#ff4655; }
</style>
</head>
<body>

<h1>Lista profili</h1>
<div id="list"></div>

<script>
fetch("data.json")
  .then(r => r.json())
  .then(data => {
    const list = document.getElementById("list");

    data.forEach(p => {
      const div = document.createElement("div");
      div.className = "card";
      div.onclick = () => window.location = `profile.html?id=${p.id}`;

      div.innerHTML = `
        <img src="${p.avatar}">
        <div>
          <h2>${p.imie}</h2>
          <p>${p.postac}</p>
        </div>
      `;

      list.appendChild(div);
    });
  });
</script>

</body>
</html>
